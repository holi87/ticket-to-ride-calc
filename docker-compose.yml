version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ticket-to-ride-calc:latest
    container_name: ticket-to-ride-calc
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
