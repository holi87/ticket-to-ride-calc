apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-to-ride-calc
  labels:
    app: ticket-to-ride-calc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticket-to-ride-calc
  template:
    metadata:
      labels:
        app: ticket-to-ride-calc
    spec:
      containers:
        - name: app
          image: ticket-to-ride-calc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ticket-to-ride-calc
                topologyKey: kubernetes.io/hostname
